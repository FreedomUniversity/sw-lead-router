name: scuderia-lead-round-robin
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}
jobs:
  assign:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: python round_robin.py
        env:
          GHL_TOKEN: ${{ secrets.GHL_TOKEN }}
